<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏔️ BALL JUMP · 2000m+ · MOBILE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e1c26;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      touch-action: pan-y; 
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      width: 100%;
      max-width: 650px;
    }

    .canvas-container {
      position: relative;
      width: 100%;
      border-radius: 32px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 0 0 3px #3d7a9e;
      background: #1a3a4b;
      padding: 8px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 24px;
      background: radial-gradient(circle at 50% 20%, #c2e2f2, #6d9eb0);
      box-shadow: inset 0 -6px 12px #1e3e4e;
      touch-action: none;
      cursor: pointer;
      aspect-ratio: 600 / 800;
    }

    /* Mobile controls overlay */
    .touch-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      width: 100%;
      padding: 0 8px;
      gap: 10px;
    }

    .ctrl-btn {
      background: #1f495e;
      border: none;
      border-bottom: 6px solid #0b262f;
      color: white;
      font-weight: bold;
      font-size: 32px;
      padding: 16px 0;
      border-radius: 60px;
      box-shadow: 0 8px 0 #0a1a22, 0 8px 12px black;
      text-align: center;
      flex: 1;
      transition: 0.05s;
      user-select: none;
      touch-action: manipulation;
      cursor: pointer;
      min-width: 80px;
      letter-spacing: 4px;
      border: 1px solid #6da5c2;
    }

    .ctrl-btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #0a1a22, 0 6px 10px black;
      border-bottom-width: 3px;
    }

    .jump-btn {
      background: #d68b2c;
      border-bottom-color: #7a4f1a;
      border: 1px solid #ffcd94;
      color: #10231c;
      font-size: 40px;
      flex: 1.5;
    }

    .status-panel {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
      margin: 10px 8px 5px;
      color: #ebf7ff;
      text-shadow: 3px 3px 0 #102a35;
      font-weight: bold;
    }

    .score-board {
      background: #103542;
      padding: 12px 28px;
      border-radius: 48px;
      font-size: 28px;
      box-shadow: inset 0 2px 8px #2f6b85, 0 6px 0 #091f28;
      border-bottom: 2px solid #80c8e5;
      color: #ffe484;
    }

    .reset-btn {
      background: #387e9b;
      border: none;
      border-bottom: 5px solid #164252;
      color: #f0f9ff;
      font-weight: bold;
      font-size: 20px;
      padding: 10px 24px;
      border-radius: 48px;
      box-shadow: 0 5px 0 #0e2a37, 0 6px 12px black;
      cursor: pointer;
      transition: 0.08s;
      touch-action: manipulation;
      border: 1px solid #97ccf0;
    }

    .reset-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0e2a37, 0 5px 10px black;
    }

    .hint-text {
      color: #b1d9e8;
      margin-left: 12px;
      font-size: 16px;
      font-weight: 500;
    }

    /* disable double-tap zoom on buttons */
    button {
      touch-action: manipulation;
    }

    @media (max-width: 500px) {
      .ctrl-btn {
        font-size: 26px;
        padding: 14px 0;
      }
      .score-board {
        font-size: 22px;
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="canvas-container">
    <canvas id="gameCanvas" width="600" height="800"></canvas>
  </div>

  <!-- Mobile touch controls (also work with mouse) -->
  <div class="touch-controls">
    <button class="ctrl-btn" id="leftBtn">←</button>
    <button class="ctrl-btn" id="rightBtn">→</button>
    <button class="ctrl-btn jump-btn" id="jumpBtn">⬆️ JUMP</button>
  </div>

  <div class="status-panel">
    <div class="score-board">🏔️ <span id="heightDisplay">0</span>m</div>
    <button class="reset-btn" id="resetButton">🔄 RESTART</button>
  </div>
  <div style="display: flex; width: 100%; padding-left: 12px;">
    <span class="hint-text">←→ / tap · climb 2000m+</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- CANVAS -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const heightSpan = document.getElementById('heightDisplay');

    // ----- WORLD (extended for 2000m+ climb) -----
    const WORLD_WIDTH = 600;
    const WORLD_HEIGHT = 6000;   // plenty of vertical space
    
    // ----- PLAYER -----
    const BALL_RADIUS = 18;
    let player = {
      x: 300,
      y: 780,          // start near ground
      vx: 0,
      vy: 0,
      radius: BALL_RADIUS,
      onGround: false
    };

    // ----- PHYSICS -----
    const GRAVITY = 0.5;
    const JUMP_FORCE = -10.8;
    const MOVE_SPEED = 5.6;
    const FRICTION_AIR = 0.76;
    const MAX_FALL_SPEED = 15;

    // ----- CAMERA -----
    let cameraY = 0;
    const CAMERA_SMOOTH = 0.09;
    
    // ----- ROCKS (generated to reach y = -1800, ~2600m climb) -----
    let rocks = [];
    
    // ----- SCORE (meters climbed from start) -----
    let maxHeightReached = 780;   // start Y
    let currentScore = 0;
    
    // ----- CONTROLS -----
    let leftPressed = false;
    let rightPressed = false;
    let jumpPressed = false;
    
    let gameActive = true;
    let animationFrame = null;
    
    // ----- RESET (keep rock layout) -----
    function resetPlayerAndCamera() {
      player.x = 300;
      player.y = 780;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      
      cameraY = player.y - canvas.height * 0.55;
      cameraY = Math.max(-2300, Math.min(900, cameraY));
      
      gameActive = true;
    }
    
    // ----- GENERATE ROCKS for 2000m+ climb (y from 800 down to -1800) -----
    function buildRocks() {
      rocks = [];
      
      function addRock(x, y, w, h) {
        rocks.push({
          x, y, w, h,
          color: `hsl(${28 + Math.random() * 22}, 68%, 34%)`
        });
      }
      
      // === BASE / GROUND (safe start) ===
      addRock(160, 820, 280, 24);
      addRock(80, 780, 140, 18);
      addRock(400, 780, 140, 18);
      
      // === TIER 1 (0m - 400m) ===
      addRock(70, 670, 130, 18);
      addRock(410, 600, 140, 20);
      addRock(150, 520, 150, 20);
      addRock(430, 440, 130, 18);
      addRock(90, 360, 150, 22);
      
      // === TIER 2 (400m - 1000m) ===
      addRock(370, 280, 160, 20);
      addRock(130, 190, 150, 20);
      addRock(450, 110, 120, 18);
      addRock(200, 40, 140, 20);
      addRock(60, -40, 150, 22);
      addRock(380, -100, 150, 20);
      
      // === TIER 3 (1000m - 1600m) ===
      addRock(160, -180, 160, 22);
      addRock(420, -270, 140, 20);
      addRock(80, -360, 150, 22);
      addRock(330, -440, 160, 20);
      addRock(190, -520, 140, 20);
      addRock(450, -610, 130, 22);
      
      // === TIER 4 (1600m - 2200m) ===
      addRock(70, -700, 150, 24);
      addRock(360, -790, 160, 22);
      addRock(180, -880, 150, 20);
      addRock(430, -970, 140, 22);
      addRock(100, -1060, 160, 24);
      addRock(310, -1150, 150, 20);
      
      // === TIER 5 (2200m - 2800m) ===
      addRock(200, -1240, 160, 22);
      addRock(440, -1330, 140, 24);
      addRock(60, -1420, 150, 22);
      addRock(360, -1510, 160, 24);
      addRock(140, -1600, 160, 26);
      addRock(400, -1690, 140, 22);
      
      // === SUMMIT ROCK (~ -1750) gives >2500m climb
      addRock(230, -1780, 180, 28);
      
      // few extra high safety rocks
      addRock(90, -1850, 140, 20);
      addRock(370, -1920, 150, 22);
    }
    
    buildRocks();
    
    // ----- COLLISION (circle vs rect) -----
    function circleRectCollision(cx, cy, r, rect) {
      const closestX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
      const dx = cx - closestX;
      const dy = cy - closestY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < r) {
        const overlap = r - dist;
        let nx = 0, ny = 0;
        if (dist > 0.001) {
          nx = dx / dist;
          ny = dy / dist;
        } else {
          nx = 0; ny = -1;
        }
        return { collided: true, overlap, nx, ny };
      }
      return { collided: false };
    }
    
    function handleCollisions() {
      player.onGround = false;
      for (let iter = 0; iter < 5; iter++) {
        let any = false;
        for (let rock of rocks) {
          const col = circleRectCollision(player.x, player.y, player.radius, rock);
          if (!col.collided) continue;
          any = true;
          
          player.x += col.nx * col.overlap;
          player.y += col.ny * col.overlap;
          
          const dot = player.vx * col.nx + player.vy * col.ny;
          if (dot < 0) {
            player.vx -= dot * col.nx * 0.35;
            player.vy -= dot * col.ny * 0.35;
          }
          
          if (col.ny < -0.7 && player.vy >= -0.5) {
            player.onGround = true;
            player.vy = Math.max(0, player.vy);
          }
          
          player.x = Math.max(player.radius, Math.min(WORLD_WIDTH - player.radius, player.x));
        }
        if (!any) break;
      }
    }
    
    // ----- UPDATE -----
    function update() {
      if (!gameActive) return;
      
      let move = 0;
      if (leftPressed) move -= 1;
      if (rightPressed) move += 1;
      
      player.vx = move ? move * MOVE_SPEED : player.vx * FRICTION_AIR;
      
      player.vy += GRAVITY;
      if (player.vy > MAX_FALL_SPEED) player.vy = MAX_FALL_SPEED;
      
      if (jumpPressed && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
        jumpPressed = false;  // one jump per press
      }
      
      player.x += player.vx;
      player.y += player.vy;
      player.x = Math.max(player.radius, Math.min(WORLD_WIDTH - player.radius, player.x));
      
      handleCollisions();
      
      // Camera follow
      const targetCam = player.y - canvas.height * 0.6;
      cameraY += (targetCam - cameraY) * CAMERA_SMOOTH;
      cameraY = Math.max(-2300, Math.min(950, cameraY));
      
      // Score = meters climbed (starting from y=800)
      if (player.y < maxHeightReached) maxHeightReached = player.y;
      const meters = Math.floor(Math.max(0, 800 - maxHeightReached));
      currentScore = meters;
      heightSpan.textContent = currentScore;
      
      // Fall off / death
      if (player.y > 1050) {
        gameActive = false;
      }
      if (player.y > 1200) {
        resetPlayerAndCamera();
        gameActive = true;
      }
    }
    
    // ----- DRAW -----
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#b7def0');
      grad.addColorStop(0.7, '#7fb9d0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Clouds
      ctx.fillStyle = '#f0f9ffc0';
      for (let i=0;i<8;i++) {
        let cx = (i*120 + cameraY*0.1) % 700 - 50;
        let cy = (i*70 + cameraY*0.03) % 500 - 150;
        ctx.beginPath();
        ctx.arc(cx, cy - cameraY*0.08, 30, 0, Math.PI*2);
        ctx.arc(cx+40, cy-15 - cameraY*0.08, 25, 0, Math.PI*2);
        ctx.fill();
      }
      
      // Rocks
      for (let r of rocks) {
        const sy = r.y - cameraY;
        if (sy + r.h < -40 || sy > canvas.height + 40) continue;
        
        ctx.fillStyle = '#2d3d2d70';
        ctx.fillRect(r.x+4, sy+4, r.w, r.h);
        
        const grad2 = ctx.createLinearGradient(r.x, sy, r.x+r.w, sy+r.h);
        grad2.addColorStop(0, r.color || '#7a5a3e');
        grad2.addColorStop(0.8, '#4f3522');
        ctx.fillStyle = grad2;
        ctx.fillRect(r.x, sy, r.w, r.h);
        
        ctx.strokeStyle = '#b89b78';
        ctx.lineWidth = 2.5;
        ctx.strokeRect(r.x+1, sy+1, r.w-2, r.h-2);
        ctx.fillStyle = '#467a4e90';
        ctx.fillRect(r.x+2, sy-3, r.w-4, 5);
      }
      
      // Ball
      const bx = player.x;
      const by = player.y - cameraY;
      
      ctx.beginPath();
      ctx.arc(bx, by+4, player.radius, 0, 2*Math.PI);
      ctx.fillStyle = '#1d3d3da0';
      ctx.fill();
      
      const ballGrad = ctx.createRadialGradient(bx-6, by-6, 3, bx, by, player.radius+2);
      ballGrad.addColorStop(0, '#f25c3b');
      ballGrad.addColorStop(0.8, '#a81e0e');
      ctx.fillStyle = ballGrad;
      ctx.beginPath();
      ctx.arc(bx, by, player.radius, 0, 2*Math.PI);
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(bx-5, by-5, 6, 0, 2*Math.PI);
      ctx.fillStyle = '#ffcf9e';
      ctx.fill();
      
      // Eye
      ctx.beginPath();
      ctx.arc(bx+4, by-4, 5, 0, 2*Math.PI);
      ctx.fillStyle = '#fafaf5';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx+7, by-7, 2.8, 0, 2*Math.PI);
      ctx.fillStyle = '#16212b';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx+9, by-10, 1.3, 0, 2*Math.PI);
      ctx.fillStyle = 'white';
      ctx.fill();
      
      // Game over overlay
      if (!gameActive) {
        ctx.fillStyle = '#10222ed9';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 34px "Segoe UI", Arial';
        ctx.fillStyle = '#fad48b';
        ctx.shadowColor = '#121212';
        ctx.shadowBlur = 14;
        ctx.textAlign = 'center';
        ctx.fillText('💥 FALL', canvas.width/2, canvas.height/2-20);
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText('tap RESTART', canvas.width/2, canvas.height/2+35);
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
      }
      
      // Altitude indicator
      ctx.font = 'bold 16px monospace';
      ctx.fillStyle = '#152e38';
      ctx.fillText('📈 ' + currentScore + 'm', 20, 45);
    }
    
    function gameLoop() {
      if (gameActive) update();
      draw();
      animationFrame = requestAnimationFrame(gameLoop);
    }
    
    // ----- INPUT (keyboard + mobile buttons) -----
    function handleKeyDown(e) {
      const key = e.key;
      if (key === ' ' || key === 'Space' || key.startsWith('Arrow')) {
        e.preventDefault();
      }
      if (!gameActive) return;
      if (key === 'ArrowLeft' || key === 'a' || key === 'A') leftPressed = true;
      if (key === 'ArrowRight' || key === 'd' || key === 'D') rightPressed = true;
      if (key === 'ArrowUp' || key === 'w' || key === 'W' || key === ' ' || key === 'Space') {
        jumpPressed = true;
        e.preventDefault();
      }
    }
    
    function handleKeyUp(e) {
      const key = e.key;
      if (key === ' ' || key === 'Space' || key.startsWith('Arrow')) e.preventDefault();
      if (key === 'ArrowLeft' || key === 'a' || key === 'A') leftPressed = false;
      if (key === 'ArrowRight' || key === 'd' || key === 'D') rightPressed = false;
      if (key === 'ArrowUp' || key === 'w' || key === 'W' || key === ' ' || key === 'Space') {
        jumpPressed = false;
        e.preventDefault();
      }
    }
    
    // Block arrow scroll globally
    window.addEventListener('keydown', (e) => {
      if (e.key.startsWith('Arrow') || e.key === ' ' || e.key === 'Space') e.preventDefault();
    }, false);
    
    // ----- MOBILE BUTTONS -----
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const jumpBtn = document.getElementById('jumpBtn');
    
    function setLeft(state) { leftPressed = state; }
    function setRight(state) { rightPressed = state; }
    function setJump(state) { 
      if (state && gameActive) jumpPressed = true; 
      else if (!state) jumpPressed = false;
    }
    
    // Touch + mouse support
    leftBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setLeft(true); });
    leftBtn.addEventListener('mouseup', () => setLeft(false));
    leftBtn.addEventListener('mouseleave', () => setLeft(false));
    leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setLeft(true); });
    leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); setLeft(false); });
    
    rightBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setRight(true); });
    rightBtn.addEventListener('mouseup', () => setRight(false));
    rightBtn.addEventListener('mouseleave', () => setRight(false));
    rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setRight(true); });
    rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); setRight(false); });
    
    jumpBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setJump(true); });
    jumpBtn.addEventListener('mouseup', () => setJump(false));
    jumpBtn.addEventListener('mouseleave', () => setJump(false));
    jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setJump(true); });
    jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); setJump(false); });
    
    // Prevent canvas touch events from interfering
    canvas.addEventListener('touchstart', (e) => e.preventDefault());
    canvas.addEventListener('touchmove', (e) => e.preventDefault());
    canvas.addEventListener('touchend', (e) => e.preventDefault());
    
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);
    
    // ----- RESET -----
    function fullReset() {
      buildRocks();
      player.x = 300;
      player.y = 780;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      cameraY = player.y - canvas.height * 0.55;
      maxHeightReached = 780;
      currentScore = 0;
      heightSpan.textContent = '0';
      gameActive = true;
      leftPressed = false; rightPressed = false; jumpPressed = false;
    }
    
    document.getElementById('resetButton').addEventListener('click', fullReset);
    
    // Start
    cameraY = player.y - canvas.height * 0.55;
    maxHeightReached = player.y;
    gameLoop();
    
    window.addEventListener('beforeunload', () => {
      if (animationFrame) cancelAnimationFrame(animationFrame);
    });
  })();
</script>
</body>
</html>
