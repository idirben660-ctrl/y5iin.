<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Y5IIN — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0b0f14;
  --card: #0f1620;
  --muted: #a7b0be;
  --text: #e8eef7;
  --accent: #62d0ff;
  --accent-2:#9b7dff;
  --ring: rgba(98,208,255,.45);
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --radius-xl: 22px;
  --radius-lg: 16px;
  --radius-md: 12px;
}
body.light{
  --bg:#f9fafb; --card:#fff; --muted:#6b7280; --text:#111827; --accent:#3b82f6; --accent-2:#9333ea; --ring:rgba(59,130,246,.25); --shadow:0 5px 15px rgba(0,0,0,.1);
}
*{box-sizing:border-box}
body{margin:0; font-family:Inter,sans-serif; background:var(--bg); color:var(--text); transition:.3s;}
.container{max-width:1024px;margin:0 auto;padding:28px 18px 80px;}
.header{display:flex; align-items:center; gap:20px; margin-bottom:20px;}
.theme-toggle{margin-left:auto; cursor:pointer; padding:6px 12px; border-radius:12px; border:none; font-weight:700; background:var(--accent); color:#fff;}
.theme-toggle:hover{opacity:.85;}
.avatar{width:120px;height:120px;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);}
.avatar img{width:100%;height:100%;object-fit:cover;}
.name{font-size:clamp(24px,3.2vw,40px); font-weight:800;}
.tagline{color:var(--muted); margin-top:6px;}
.card{background:var(--card); border-radius:var(--radius-xl); padding:18px; box-shadow:var(--shadow);}
.stats{display:flex; gap:12px; flex-wrap:wrap;}
.stat{flex:1; padding:14px; border-radius:16px; background:var(--card);}
.stat .label{color:var(--muted); font-size:12px; text-transform:uppercase;}
.stat .value{font-size:22px; font-weight:900;}
.embed{display:flex; align-items:center; gap:16px; padding:16px; border-radius:var(--radius-lg); margin-bottom:12px; background:var(--card);}
.icon{width:42px;height:42px; display:grid; place-items:center;}
.icon svg{width:28px;height:28px; fill:var(--text);}
.meta .title{font-weight:800;}
.meta .sub{color:var(--muted);}
.actions{margin-left:auto;}
.btn{border:none; border-radius:12px; padding:10px 12px; font-weight:700; cursor:pointer; background:linear-gradient(90deg,#e8eef7,#bcd7ff); color:#06101a;}
.btn.ghost{background:transparent; color:var(--text); outline:1px solid rgba(255,255,255,.1);}
.pillbar{display:flex; gap:10px; margin-top:16px;}
.pill{font-size:13px; font-weight:700; padding:8px 12px; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--accent-2));}
.flex-left{display:flex; align-items:center; gap:16px;}
</style>
</head>
<body>
<div class="container">
  <div class="flex-left">
    <div>
      <div class="name" id="displayName">Y5IIN</div>
      <div class="tagline" id="tagline">EDITING FOR FUN — Welcome to my world</div>
    </div>
    <div class="avatar"><img id="avatarImg" src="https://media.discordapp.net/attachments/1237420050307219509/1412453192175976593/IMG_5325.jpg?ex=68b8590b&is=68b7078b&hm=97b727ffcb4583f4fbbf9b0001866e22d9974135ab71e4e674a431b8068da5ee&=&format=webp&width=894&height=882" alt="Profile"></div>
    <button class="theme-toggle" id="themeToggle">Toggle Theme</button>
  </div>

  <div class="pillbar">
    <span class="pill">Open for collabs</span>
    <span class="pill">Always building</span>
  </div>

  <div class="card" style="margin-top:20px;">
    <div class="stats">
      <div class="stat">
        <div class="label">Visitors</div>
        <div class="value" id="visitorCount">—</div>
        <div class="muted" id="visitorHint" style="font-size:12px;"></div>
      </div>
      <div class="stat">
        <div class="label">Last Updated</div>
        <div class="value" id="lastUpdated">—</div>
      </div>
      <div class="stat">
        <div class="label">Profiles</div>
        <div class="value" id="profileCount">—</div>
      </div>
    </div>
  </div>

  <section style="margin-top:26px;">
    <h2>Embeds</h2>
    <div id="embeds"></div>
  </section>
</div>

<script>
const SITE={
  name:"Y5IIN",
  tagline:"EDITING FOR FUN — Welcome to my world",
  avatar:"https://media.discordapp.net/attachments/1237420050307219509/1412453192175976593/IMG_5325.jpg?ex=68b8590b&is=68b7078b&hm=97b727ffcb4583f4fbbf9b0001866e22d9974135ab71e4e674a431b8068da5ee&=&format=webp&width=894&height=882",
  lastUpdatedISO:"2025-09-02T12:00:00Z",
  counterEndpoint:"https://api.countapi.xyz/hit/y5iin/profile",
  embeds:[
    {kind:"X", title:"Follow on X", handle:"Soon…", url:"#", styleVariant:"cyan"},
    {kind:"Instagram", title:"Instagram", handle:"@y5ii.n", url:"https://www.instagram.com/y5ii.n/?utm_source=ig_web_button_share_sheet", styleVariant:"violet"},
    {kind:"YouTube", title:"YouTube Channel", handle:"@y5iin", url:"https://youtube.com/@y5iin?si=mtRR-MycmUN7wUs-", styleVariant:"crimson"},
    {kind:"TikTok", title:"TikTok", handle:"@y5iin", url:"https://www.tiktok.com/@y5iin?_t=ZS-8zOUpSnSxF9&_r=1", styleVariant:"pink"},
    {kind:"Discord", title:"Discord Server", handle:"Soon…", url:"#", styleVariant:"indigo"}
  ]
};

const ICONS={
  YouTube:`<svg viewBox="0 0 24 24"><path d="M23.5 6.2s-.2-1.7-.9-2.4c-.9-.9-1.9-.9-2.4-1C16.8 2.5 12 2.5 12 2.5h-.1s-4.8 0-8.2.3c-.5.1-1.5.1-2.4 1-.7.7-.9 2.4-.9 2.4S0 8.1 0 10v1.9c0 1.9.2 3.8.2 3.8s.2 1.7.9 2.4c.9.9 2.1.9 2.7 1 2 .2 8.2.3 8.2.3s4.8 0 8.2-.3c.5-.1 1.5-.1 2.4-1 .7-.7.9-2.4.9-2.4s.2-1.9.2-3.8V10c0-1.9-.2-3.8-.2-3.8zM9.5 14.5v-5.9l6.2 3-6.2 2.9z"/></svg>`,
  TikTok:`<svg viewBox="0 0 24 24"><path d="M12 2c1 0 2 .2 3 .6v4.5c0 .3.2.6.5.7 1 .5 2.1.8 3.3.8v3.5c-1.5 0-3-.4-4.3-1.1v5.7c0 2.9-2.4 5.3-5.3 5.3S4 19.6 4 16.7c0-2.9 2.4-5.3 5.3-5.3.3 0 .7 0 1 .1v3.6c-.3-.1-.6-.1-1-.1-1 .0-1.8.9-1.8 1.8s.8 1.8 1.8 1.8c1 0 1.8-.9 1.8-1.8V2h1z"/></svg>`,
  Instagram:`<svg viewBox="0 0 24 24"><path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2c1.7 0 3 1.3 3 3v10c0 1.7-1.3 3-3 3H7c-1.7 0-3-1.3-3-3V7c0-1.7 1.3-3 3-3h10zm-5 3a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm4.8-2.8a1.2 1.2 0 100 2.4 1.2 1.2 0 000-2.4z"/></svg>`,
  X:`<svg viewBox="0 0 24 24"><path d="M18 2h4l-8.6 9.7L22 22h-7.1l-5.4-7.1L4 22H0l9.3-10.5L1.8 2h7.1l4.7 6.2L18 2z"/></svg>`,
  Discord:`<svg viewBox="0 0 24 24"><path d="M20 4a19.8 19.8 0 00-4.9-1.5.1.1 0 00-.1.1c-.2.3-.4.6-.5.9a17.6 17.6 0 00-5 0 6.5 6.5 0 00-.5-.9.1.1 0 00-.1-.1A19.8 19.8 0 004 4c-1.6 2.3-2.6 5.1-2.6 8.1 0 6.5 4.7 11.9 11 11.9s11-5.4 11-11.9c0-3-.9-5.8-2.6-8.1zM8.5 15c-.9 0-1.6-.8-1.6-1.7 0-.9.7-1.7 1.6-1.7.9 0 1.6.8 1.6 1.7 0 .9-.7 1.7-1.6 1.7zm7 0c-.9 0-1.6-.8-1.6-1.7 0-.9.7-1.7 1.6-1.7.9 0 1.6.8 1.6 1.7 0 .9-.7 1.7-1.6 1.7z"/></svg>`
};

const VARIANT_STYLES={
  cyan:'linear-gradient(180deg, rgba(98,208,255,.18), rgba(98,208,255,.08))',
  violet:'linear-gradient(180deg, rgba(155,125,255,.20), rgba(155,125,255,.08))',
  crimson:'linear-gradient(180deg, rgba(244,63,94,.22), rgba(244,63,94,.10))',
  pink:'linear-gradient(180deg, rgba(236,72,153,.22), rgba(236,72,153,.10))',
  indigo:'linear-gradient(180deg, rgba(79,70,229,.22), rgba(79,70,229,.10))',
  gray:'linear-gradient(180deg, rgba(148,163,184,.22), rgba(148,163,184,.10))'
};

function renderEmbeds(){
  const container=document.getElementById("embeds"); container.innerHTML="";
  SITE.embeds.forEach(e=>{
    const embed=document.createElement("div"); embed.className="embed"; embed.style.background=VARIANT_STYLES[e.styleVariant]||VARIANT_STYLES.gray;
    embed.innerHTML=`
      <div class="icon">${ICONS[e.kind]||""}</div>
      <div class="meta">
        <div class="title">${e.title}</div>
        <div class="sub">${e.handle}</div>
      </div>
      ${e.kind==="Discord"||e.kind==="X"?"":`<div class="actions">
        <button class="btn" onclick="window.open('${e.url}','_blank')">Open</button>
        <button class="btn ghost" onclick="navigator.clipboard.writeText('${e.url}')">Copy</button>
      </div>`}
    `;
    container.appendChild(embed);
  });
  document.getElementById("profileCount").textContent=SITE.embeds.length;
}

function formatDateFriendly(iso){try{const d=new Date(iso);return d.toLocaleString(undefined,{year:'numeric',month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'})}catch(e){return iso}}

function updateHeader(){
  document.getElementById("displayName").textContent=SITE.name;
  document.getElementById("tagline").textContent=SITE.tagline;
  document.getElementById("avatarImg").src=SITE.avatar;
  document.getElementById("lastUpdated").textContent=formatDateFriendly(SITE.lastUpdatedISO);
}

async function updateVisitors(){
  const el=document.getElementById("visitorCount"); const hint=document.getElementById("visitorHint");
  try{
    const res=await fetch(SITE.counterEndpoint);
    const data=await res.json();
    el.textContent=data.value||"—";
    hint.textContent="total visitors";
  }catch(err){el.textContent="—"; hint.textContent="error";}
}

document.getElementById("themeToggle").addEventListener("click",()=>{document.body.classList.toggle("light")});

updateHeader(); renderEmbeds(); updateVisitors();
</script>
</body>
</html>
